<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La Mia Avventura in Inglese 🌈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF4D6;
    --red:   #FF5A5F;
    --teal:  #2EC4B6;
    --yellow:#FFD23F;
    --green: #6BCB77;
    --pink:  #FF8FB1;
    --blue:  #4D9DE0;
    --purple:#A06CD5;
    --ink:   #2B2D42;
    --shadow: 4px 4px 0 var(--ink);
    --shadow-lg: 6px 6px 0 var(--ink);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Quicksand', sans-serif;
    background: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
  }
  body {
    background-image:
      radial-gradient(circle at 10% 20%, var(--pink) 2px, transparent 3px),
      radial-gradient(circle at 80% 10%, var(--teal) 3px, transparent 4px),
      radial-gradient(circle at 90% 70%, var(--yellow) 2px, transparent 3px),
      radial-gradient(circle at 20% 80%, var(--blue) 3px, transparent 4px),
      radial-gradient(circle at 50% 50%, var(--green) 2px, transparent 3px);
    background-size: 200px 200px;
    background-position: 0 0, 50px 80px, 120px 30px, 30px 150px, 180px 100px;
    min-height: 100vh;
  }
  h1, h2, h3 { font-family: 'Fredoka', sans-serif; font-weight: 700; }
  button { font-family: inherit; cursor: pointer; }

  /* ---------- Layout ---------- */
  .app {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  .screen { display: none; animation: pop 0.4s ease-out; }
  .screen.active { display: block; }
  @keyframes pop {
    0%   { opacity: 0; transform: scale(0.92); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    background: var(--ink);
    color: var(--yellow);
    padding: 8px 18px;
    border-radius: 14px;
    transform: rotate(-2deg);
    box-shadow: var(--shadow);
    display: inline-block;
  }
  .greeting {
    background: var(--red);
    color: white;
    padding: 8px 18px;
    border: 3px solid var(--ink);
    border-radius: 999px;
    box-shadow: var(--shadow);
    font-weight: 700;
    transform: rotate(1.5deg);
  }

  /* ---------- Welcome screen ---------- */
  .welcome-card {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 28px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    max-width: 520px;
    margin: 60px auto;
    position: relative;
  }
  .welcome-card::before {
    content: '🌈';
    position: absolute;
    top: -28px; left: -28px;
    font-size: 3.5rem;
    transform: rotate(-15deg);
  }
  .welcome-card::after {
    content: '⭐';
    position: absolute;
    bottom: -22px; right: -18px;
    font-size: 3rem;
    transform: rotate(15deg);
  }
  .welcome-card h1 {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    color: var(--red);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .welcome-card .sub {
    color: var(--ink);
    opacity: 0.7;
    margin-bottom: 28px;
    font-size: 1.05rem;
  }
  .name-input {
    width: 100%;
    padding: 16px 20px;
    font-size: 1.3rem;
    font-family: 'Fredoka', sans-serif;
    border: 4px solid var(--ink);
    border-radius: 16px;
    background: var(--yellow);
    color: var(--ink);
    text-align: center;
    outline: none;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  .name-input:focus { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  .big-btn {
    margin-top: 20px;
    background: var(--green);
    color: var(--ink);
    border: 4px solid var(--ink);
    padding: 16px 32px;
    font-size: 1.3rem;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    border-radius: 16px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .big-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  .big-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }

  /* ---------- Lesson grid ---------- */
  .intro-banner {
    background: var(--teal);
    border: 4px solid var(--ink);
    border-radius: 22px;
    padding: 18px 22px;
    margin-bottom: 28px;
    box-shadow: var(--shadow);
    color: white;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.15rem;
    transform: rotate(-0.5deg);
  }
  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 22px;
  }
  .lesson-card {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 22px;
    padding: 22px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
  }
  .lesson-card:hover { transform: translate(-3px, -3px) rotate(-1deg); box-shadow: 7px 7px 0 var(--ink); }
  .lesson-card[data-color="1"] { background: var(--yellow); }
  .lesson-card[data-color="2"] { background: var(--pink); }
  .lesson-card[data-color="3"] { background: var(--blue); color: white;}
  .lesson-card[data-color="4"] { background: var(--green); }
  .lesson-card[data-color="5"] { background: var(--purple); color: white; }
  .lesson-emoji { font-size: 3.5rem; line-height: 1; margin-bottom: 8px; display: block; }
  .lesson-title-en { font-family: 'Fredoka', sans-serif; font-size: 1.45rem; line-height: 1.1; }
  .lesson-title-it { font-family: 'Quicksand', sans-serif; font-style: italic; opacity: 0.85; margin-top: 4px; font-size: 0.95rem; }
  .stars {
    margin-top: 14px;
    display: flex;
    gap: 4px;
    font-size: 1.4rem;
  }
  .stars .star { filter: grayscale(1); opacity: 0.4; }
  .stars .star.earned { filter: none; opacity: 1; animation: wiggle 0.5s ease; }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0); }
    25%      { transform: rotate(-12deg) scale(1.2); }
    75%      { transform: rotate(12deg) scale(1.2); }
  }

  /* ---------- Lesson view ---------- */
  .back-btn {
    background: var(--ink);
    color: white;
    border: 3px solid var(--ink);
    padding: 10px 18px;
    border-radius: 999px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1rem;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .back-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--red); }
  .lesson-header {
    background: var(--red);
    color: white;
    border: 4px solid var(--ink);
    border-radius: 22px;
    padding: 22px;
    box-shadow: var(--shadow);
    margin-bottom: 22px;
    text-align: center;
  }
  .lesson-header h2 { font-size: 2rem; }
  .lesson-header .it { font-style: italic; opacity: 0.92; margin-top: 4px; }
  .section {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 22px;
    padding: 22px;
    box-shadow: var(--shadow);
    margin-bottom: 22px;
  }
  .section-label {
    display: inline-block;
    background: var(--yellow);
    border: 3px solid var(--ink);
    padding: 4px 14px;
    border-radius: 999px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    margin-bottom: 14px;
    transform: rotate(-2deg);
  }
  .section h3 { font-size: 1.4rem; margin-bottom: 12px; }
  .section p.italian { font-style: italic; color: #555; margin-bottom: 14px; line-height: 1.5; }

  /* ---------- Video ---------- */
  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 4px solid var(--ink);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    background: black;
  }
  .video-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }
  .video-note {
    background: var(--cream);
    border: 2px dashed var(--ink);
    padding: 10px 14px;
    border-radius: 12px;
    margin-top: 14px;
    font-size: 0.95rem;
  }

  /* ---------- Vocabulary ---------- */
  .vocab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
  }
  .vocab-card {
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 16px;
    padding: 14px;
    text-align: center;
    transition: transform 0.15s;
    cursor: pointer;
    user-select: none;
  }
  .vocab-card:hover { transform: scale(1.05) rotate(-2deg); background: var(--yellow); }
  .vocab-card .emoji { font-size: 2.8rem; display: block; }
  .vocab-card .en {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.2rem;
    color: var(--red);
    margin-top: 6px;
  }
  .vocab-card .it {
    font-size: 0.9rem;
    color: var(--ink);
    opacity: 0.7;
    font-style: italic;
  }

  /* ---------- Quiz ---------- */
  .question {
    margin-bottom: 26px;
    padding: 18px;
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 18px;
  }
  .question-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.25rem;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .question-it {
    font-size: 0.95rem;
    font-style: italic;
    color: #555;
    margin-bottom: 14px;
  }
  .colour-row {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
  }
  .shape-btn {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 18px;
    padding: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 3px 3px 0 var(--ink);
    position: relative;
  }
  .shape-btn:hover:not(.coloured):not(.disabled) { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }
  .shape-btn.coloured { animation: poppop 0.5s ease; cursor: default; }
  .shape-btn.wrong { animation: shake 0.4s ease; }
  .shape-btn.disabled { cursor: not-allowed; opacity: 0.6; }
  .shape-btn svg { display: block; }
  .shape-btn .label {
    font-family: 'Fredoka', sans-serif;
    text-align: center;
    margin-top: 4px;
    font-size: 0.95rem;
  }
  @keyframes poppop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.2) rotate(-5deg); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-8px); }
    75%      { transform: translateX(8px); }
  }
  .feedback {
    margin-top: 10px;
    text-align: center;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
    min-height: 1.4em;
  }
  .feedback.good { color: var(--green); }
  .feedback.bad  { color: var(--red); }

  .finish-btn {
    background: var(--yellow);
    border: 4px solid var(--ink);
    padding: 16px 28px;
    border-radius: 16px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    box-shadow: var(--shadow);
    display: block;
    margin: 28px auto 0;
  }
  .finish-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }

  /* ---------- Celebration ---------- */
  .celebrate {
    position: fixed;
    inset: 0;
    background: rgba(43, 45, 66, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .celebrate.show { display: flex; animation: pop 0.4s ease; }
  .celebrate-card {
    background: white;
    border: 5px solid var(--ink);
    border-radius: 26px;
    padding: 36px 30px;
    text-align: center;
    box-shadow: 8px 8px 0 var(--yellow);
    max-width: 420px;
  }
  .celebrate-card .big {
    font-size: 5rem;
    animation: spin 1.5s ease infinite;
    display: inline-block;
  }
  @keyframes spin {
    0%, 100% { transform: rotate(-10deg) scale(1); }
    50%      { transform: rotate(10deg) scale(1.1); }
  }
  .celebrate-card h2 { color: var(--red); margin: 10px 0; font-size: 2rem; }
  .celebrate-card p  { margin-bottom: 18px; font-size: 1.1rem; }

  /* Footer mini */
  footer.mini {
    text-align: center;
    margin-top: 40px;
    font-size: 0.85rem;
    opacity: 0.55;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============ WELCOME ============ -->
  <section id="screen-welcome" class="screen active">
    <div class="welcome-card">
      <h1>La Mia Avventura<br>in Inglese!</h1>
      <p class="sub">Ciao! Come ti chiami? 🌟<br><em>Hi! What's your name?</em></p>
      <input id="name-input" class="name-input" type="text" placeholder="Il tuo nome..." maxlength="20" />
      <br>
      <button id="start-btn" class="big-btn">Andiamo! Let's go! 🚀</button>
    </div>
  </section>

  <!-- ============ DASHBOARD ============ -->
  <section id="screen-dashboard" class="screen">
    <header>
      <span class="logo">🌈 English Adventure</span>
      <span class="greeting" id="greeting-pill">Ciao!</span>
    </header>

    <div class="intro-banner">
      🎵 Scegli una lezione e canta con me! <br>
      <small><em>Pick a lesson and sing along with me!</em></small>
    </div>

    <div class="lesson-grid" id="lesson-grid"></div>

    <footer class="mini">
      Made with 🧡 for little English learners
    </footer>
  </section>

  <!-- ============ LESSON ============ -->
  <section id="screen-lesson" class="screen">
    <button class="back-btn" onclick="goDashboard()">← Torna indietro</button>
    <div id="lesson-content"></div>
  </section>

</div>

<!-- Celebration overlay -->
<div id="celebrate" class="celebrate">
  <div class="celebrate-card">
    <span class="big">🎉</span>
    <h2>Bravissimo!</h2>
    <p id="celebrate-msg">You did it! Hai vinto tutte le stelline! ⭐⭐⭐</p>
    <button class="big-btn" onclick="closeCelebrate()">Continua!</button>
  </div>
</div>

/* ============================================================
   STATE & STORAGE
   ============================================================ */
const STORAGE_KEY = 'english-adventure-v1';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { name: '', progress: {} }; // progress: { lessonId: starsEarned }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function show(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goDashboard() {
  document.getElementById('greeting-pill').textContent =
    state.name ? `Ciao ${state.name}!` : 'Ciao!';
  renderLessonGrid();
  show('screen-dashboard');
}

/* ============================================================
   WELCOME
   ============================================================ */
document.getElementById('start-btn').addEventListener('click', () => {
  const name = document.getElementById('name-input').value.trim();
  state.name = name || 'amico';
  saveState();
  goDashboard();
});
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('start-btn').click();
});

// If returning visitor, skip welcome
if (state.name) {
  document.getElementById('name-input').value = state.name;
  goDashboard();
}

/* ============================================================
   DASHBOARD GRID
   ============================================================ */
function renderLessonGrid() {
  const grid = document.getElementById('lesson-grid');
  grid.innerHTML = '';
  LESSONS.forEach(lesson => {
    const stars = state.progress[lesson.id] || 0;
    const starsHtml = [1,2,3].map(i =>
      `<span class="star${i <= stars ? ' earned' : ''}">⭐</span>`).join('');
    const card = document.createElement('div');
    card.className = 'lesson-card';
    card.dataset.color = lesson.color;
    card.innerHTML = `
      <span class="lesson-emoji">${lesson.emoji}</span>
      <div class="lesson-title-en">${lesson.titleEn}</div>
      <div class="lesson-title-it">${lesson.titleIt}</div>
      <div class="stars">${starsHtml}</div>
    `;
    card.addEventListener('click', () => openLesson(lesson.id));
    grid.appendChild(card);
  });
}

/* ============================================================
   LESSON VIEW
   ============================================================ */
let currentLesson = null;
let currentScore  = 0;

function openLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  currentLesson = lesson;
  currentScore = 0;

  const root = document.getElementById('lesson-content');
  root.innerHTML = `
    <div class="lesson-header">
      <h2>${lesson.emoji} ${lesson.titleEn}</h2>
      <div class="it">${lesson.titleIt}</div>
    </div>

    <div class="section">
      <span class="section-label">🎬 Guarda & Canta</span>
      <h3>Watch the song!</h3>
      <p class="italian">${lesson.intro}</p>
      <div class="video-wrap">
        <iframe
          src="${lesson.video}"
          title="${lesson.titleEn}"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="video-note">
        💡 <strong>Captions:</strong> Click the CC button on the video to show English words.
        <em>Clicca "CC" sul video per vedere le parole in inglese!</em>
      </div>
    </div>

    <div class="section">
      <span class="section-label">📚 Parole Nuove</span>
      <h3>New Words</h3>
      <p class="italian">Clicca le parole per scoprirle! / Click each word to discover it!</p>
      <div class="vocab-grid">
        ${lesson.vocab.map(v => `
          <div class="vocab-card" onclick="this.classList.toggle('flip')">
            <span class="emoji">${v.emoji}</span>
            <div class="en">${v.en}</div>
            <div class="it">${v.it}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="section">
      <span class="section-label">🎨 Colora la Risposta</span>
      <h3>Colour the Answer!</h3>
      <p class="italian">Tocca la cosa giusta per colorarla! / Tap the right one to colour it in!</p>
      <div id="quiz-container"></div>
      <button id="finish-btn" class="finish-btn" style="display:none">Ho finito! 🏆</button>
    </div>
  `;

  renderQuiz(lesson);
  show('screen-lesson');
}

function renderQuiz(lesson) {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  lesson.questions.forEach((q, qi) => {
    const qEl = document.createElement('div');
    qEl.className = 'question';
    qEl.innerHTML = `
      <div class="question-text">${q.textEn}</div>
      <div class="question-it">${q.textIt}</div>
      <div class="colour-row" data-q="${qi}">
        ${q.shapes.map((s, si) => `
          <div class="shape-btn" data-q="${qi}" data-s="${si}">
            ${shapeSVG(s.label)}
            <div class="label">${s.label}</div>
          </div>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${qi}"></div>
    `;
    container.appendChild(qEl);
  });

  container.querySelectorAll('.shape-btn').forEach(btn => {
    btn.addEventListener('click', handleShapeClick);
  });
}

function handleShapeClick(e) {
  const btn = e.currentTarget;
  if (btn.classList.contains('coloured') || btn.classList.contains('disabled')) return;
  const qi = +btn.dataset.q;
  const si = +btn.dataset.s;
  const q  = currentLesson.questions[qi];
  const shape = q.shapes[si];
  const fb = document.getElementById('fb-' + qi);

  if (shape.correct) {
    // Fill the SVG inside this button
    btn.querySelectorAll('svg .fillable').forEach(el => {
      el.style.fill = q.fillColor;
      el.style.transition = 'fill 0.5s ease';
    });
    btn.classList.add('coloured');
    fb.textContent = '✨ Bravissimo! Yes! ✨';
    fb.className = 'feedback good';
    currentScore++;
    // disable siblings
    document.querySelectorAll(`.shape-btn[data-q="${qi}"]`).forEach(b => {
      if (b !== btn) b.classList.add('disabled');
    });
    checkComplete();
  } else {
    btn.classList.add('wrong');
    fb.textContent = '🤔 Riprova! Try again!';
    fb.className = 'feedback bad';
    setTimeout(() => btn.classList.remove('wrong'), 500);
  }
}

function checkComplete() {
  const total = currentLesson.questions.length;
  const done  = document.querySelectorAll('.shape-btn.coloured').length;
  if (done === total) {
    document.getElementById('finish-btn').style.display = 'block';
    document.getElementById('finish-btn').onclick = finishLesson;
  }
}

function finishLesson() {
  // Award stars based on score (always 3 here since they had to get all correct)
  const stars = 3;
  const existing = state.progress[currentLesson.id] || 0;
  if (stars > existing) state.progress[currentLesson.id] = stars;
  saveState();

  document.getElementById('celebrate-msg').innerHTML =
    `${state.name ? state.name + ', ' : ''}hai imparato <strong>${currentLesson.titleEn}</strong>! ⭐⭐⭐<br>
     <em>You learned ${currentLesson.titleEn}!</em>`;
  document.getElementById('celebrate').classList.add('show');
}

function closeCelebrate() {
  document.getElementById('celebrate').classList.remove('show');
  goDashboard();
}
